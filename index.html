<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio website for Gosme featuring projects, experience, and contact information.">
  <title>Gosme | Portfolio</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="no-js">
  <div class="page-shell">
    <main id="top">
      <section class="welcome-banner is-hidden" id="welcome-banner" aria-live="polite">
        <button class="welcome-close" id="welcome-close" type="button" aria-label="Close welcome">Close</button>
        <div class="welcome-copy">
          <img src="images/welcome.png" alt="Welcome" class="welcome-image">
        </div>
        <div class="welcome-progress" aria-hidden="true">
          <span class="welcome-progress-bar"></span>
        </div>
      </section>

      <header class="site-header">
        <a class="brand" href="#" aria-label="Gosme home">
          <img src="images/header.png" alt="Gosme">
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
          <a href="#about">About</a>
          <a href="#projects">Projects</a>
          <a href="#experience">Experience</a>
          <a href="#contact">Contact</a>
          <a href="#" id="audio-toggle" aria-label="Toggle background music" title="Play Music" style="display:flex; align-items:center;">
            <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </a>
        </nav>
      </header>

      <section class="hero section">
        <div class="hero-copy reveal">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h2 id="hero-headline"></h2>
          <p class="hero-text" id="hero-text"></p>
          <div class="hero-actions">
            <a class="button button-primary" href="#projects">See Projects</a>
            <a class="button button-secondary" href="#contact">Get In Touch</a>
          </div>
        </div>
        <aside class="hero-card reveal">
          <p class="card-label" id="hero-focus-label"></p>
          <ul class="focus-list" id="hero-focus-list"></ul>
          <div class="metric-row" id="hero-metrics"></div>
        </aside>
      </section>

      <section class="section section-grid" id="about">
        <div class="section-heading reveal">
          <p class="eyebrow" id="about-eyebrow"></p>
          <h2 id="about-headline"></h2>
        </div>
        <div class="about-layout">
          <article class="panel reveal" id="about-paragraphs">
          </article>
          <article class="panel reveal">
            <p class="panel-title" id="about-core-strengths-title"></p>
            <ul class="tag-list" id="about-core-strengths"></ul>
          </article>
        </div>
      </section>

      <section class="section" id="projects">
        <div class="section-heading reveal">
          <p class="eyebrow" id="projects-eyebrow"></p>
          <h2 id="projects-headline"></h2>
        </div>
        <div class="project-grid" id="projects-featured">
        </div>
        <div class="more-projects-wrap reveal">
          <button class="button button-secondary more-projects-toggle" id="more-projects-toggle" type="button" aria-expanded="false" aria-controls="more-projects">
            More
          </button>
        </div>
        <div class="more-projects is-hidden" id="more-projects">
        </div>
      </section>

      <section class="section" id="experience">
        <div class="section-heading reveal">
          <p class="eyebrow" id="experience-eyebrow"></p>
          <h2 id="experience-headline"></h2>
        </div>
        <div class="timeline" id="experience-featured">
        </div>
        <div class="more-timeline-wrap reveal">
          <button class="button button-secondary more-timeline-toggle" id="more-timeline-toggle" type="button" aria-expanded="false" aria-controls="more-timeline">
            Expand
          </button>
        </div>
        <div class="timeline more-timeline is-hidden" id="more-timeline" hidden style="display: none;">
        </div>
      </section>

      <section class="section contact-section" id="contact">
        <div class="section-heading reveal">
          <p class="eyebrow" id="contact-eyebrow"></p>
          <h2 id="contact-headline"></h2>
        </div>
        <div class="contact-card reveal">
          <div id="contact-paragraphs"></div>
          <div class="contact-links" id="contact-links"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Gosme. Built for GitHub Pages.</p>
    </footer>
  </div>

  <div class="video-modal is-hidden" id="video-modal" aria-hidden="true">
    <div class="video-modal-backdrop" data-close-video="true"></div>
    <div class="video-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="video-modal-title">
      <div class="video-modal-header">
        <h2 id="video-modal-title">Project Video</h2>
        <button class="video-modal-close" id="video-modal-close" type="button" aria-label="Close video">Close</button>
      </div>
      <div class="video-frame-shell">
        <iframe
          id="video-frame"
          title="Project video player"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </div>

  <button class="to-top-button" id="to-top-button" type="button" aria-label="Scroll to top">
    <img src="images/Top.png" alt="" class="to-top-image">
    <p class="to-top-text">Scroll to top</p>
  </button>

  <audio id="bgAudio" loop>
    <source src="resources/music.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
